body:
  text: 昭臺弟子傅霄編集大洞弟子陳桷校勘江總序昔劉向通古今之學馬融見天下之書京房察風雨之占裴楷曉陰陽之術子政傷於簡易季長敝於驕侈君明遂不旋踵公矩纔免極誅鮮有盡美之迹罕聞克終之譽若夫德行博敏孔空四科經術深長鄭門六藝丹陽陶先生備斯矣至知紫臺青簡緑帙丹經玉版秘文瑶壇怪牒靡不貫彼精微殫其㫖趣蓋非常之絶伎命世之異人焉文集缺亡未有編録門人補輯若逢遼東之本好事研搜如誦河西之篋奉勑校之鉛墨緘以緹緗藏彼鴻都副在延閣尋山誌年十五作倦世情之易撓乃杖䇿而尋山旣沿幽以達峻實窮阻而備艱眇遊心其未已方際夕乎雲根欣夫得志者忘形遺形者神存於是散髮解帶盤旋其上心容曠㫰氣宇條暢玄雖逺其必存累無大而不忘害馬之弊旣去解牛之刀乃王物我之情雖均因已濟吾之所尚也若夫飛聲西嶽邀利東陵楚湘之潔吴江之矜輕死重氣名貴於身迷眞晦道余所弗丞襲衣縫掖端委章甫徘徊廊廟趨翔庭宇傅氏百王流芳世緒負德叨榮吾未敢許爾乃荆門書掩蓬户夜開室迷夏草逕惑春苔庭虛月映琴響風哀夕鳥依簷暮獸爭來時復歷近壟尋逺壑坐盤石望平原日負嶂以共隱月披雲而出山風下松而含曲泉瀠石而生文草𧆑𧆑以拂露鹿颯颯而來群捫虛蘿以入谷傍洪澤而比清照石壁以端色攀桂枝而齊貞亟扈蘭而佩蕙及春駃之未鳴且含懷以屏炁待惠風而舒情乃乘興而遂往遵巖路以達遊竚天維而漂思𢠵怳惚而莫求眺回江之淼漫眩疊嶂之相稠日斜雲而色黛風過水而安流觸嶔巖而起巘值闊達而成洲石孤聳而獨絶岸懸天而似浮緑隥道其過半魂眇眇而無憂悟伯昏之條宕躡千仞而神休遂乃淩巖峭至松門背通林面長源右聯山而無際左憑海而齊天竹泫泫以垂露柳依依而迎蟬鷗雙雙而赴水鷺軒軒而歸田赴水兮汎濫歸田兮翱翔此翔濫之足樂意斯齡之不長悼菌蟪之危促羨靈椿兮未央雖鵬鷃之異類託逍遥乎一方願敷衽以逺訴思松朝而陳辭至赤城兮一憩遇王子而宿之仰彭涓兮弗逺必長年兮可期及榆光之未暮將尋山而採芝去採芝兮入深澗深澗幽兮路窈窕窈窕路兮終無曙深澗深兮未曾曉高松上兮亟停雲低蘿下兮屢迷鳥鳥迷羅兮繽紛雲停松兮欲紛紛停雲遊兮安泊離鳥棲兮索群嗟群泊其無所思參差而誰聞旣窮目以無閡先生去世後久無人編録文集至陳武帝貞明二年勑令侍中尚書令江總始撰文集先生以梁大同二年解駕至是五十三載矣文章頗多散落問漁人以前路指示余以蓬萊曰果爾以尋山之志館爾以招仙之臺就瀛水以通懷謂萬感其巳會亦千念而必諧竟莫知其所躋反無形於寂寞長超忽乎塵埃水仙賦淼漫八海汯泊九河中天起浪分地瀉波東卷長桑日窟西斡龍築月阿廼者潼關不壅石門已開導江出漢浮濟達淮漳渠水府包山洞臺娥英之所游徃琴馮是焉去來或窮髮逸鵬咸池浴日隨雲濯金漿之汧追霞採建木之實弄珠於淵客之庭卷綃乎鮫人之室此眞夐矣至於碧巖無霧緑水不風飛軒紖鳳游軿駕鴻上朝紫殿還覲青宫進麾八老顧拂四童拊洞陰之磬張玄圃之璈酌丹穴之酎薦麟洲之餚安期奉棗王母送桃錦旌麗日羽衣拂霄又其英矣及秋水方至層濤架山各巡封隩來賚王言選奇於河侯之府出寶於驪龍之川夜光燭月洪貝充轅亦其壞矣若夫層城瑤館縉雲瓊閣黄帝所以觴百神池塗山石帳天后翠幕夏禹所以集群臣也岷嶓交錯上貫井絡穹漢碅磳横帶玉繩浸湯泉於桂渚涌沸壑於金陵崩沙轉石驚湍走沫絶壁飛流萬丈懸瀨奔激芒碭之間馳騖壺口之外逮乎璇綱運極儿六數翻用謀西漢受事龍門少周姒後初會嬀前平陰鉅鹿再化爲淵清河渤海三成桑田撫二儀以惻愴哀萬兆以流漣僉自安於蝣晷緬無羨於鵠年皆松下之一物又奚足以語仙嗟乎循有生之造物固莫靈於在人寧不踵武於象帝入妙門而自賔苟淪形於無曉與螻蟻而爲塵亦有先覺之秀獨徃之英窺若士於蒙穀求吕梁於石城從務光於砥柱索龍威於洞庭迎九玄於金闕謁三素於玉清更天地而彌固終逍遥以長生華陽頌樞域河篇徵徃册孔記昭昔名三宿麗天序兩金摽地英質象宅無乃生有在有則還空靈構不待匠虛形自成功形位總神列三府分除交五便陰暉迎夜晢晨精望曉懸摽貫南峰秀玄鼎北嶺横秦壁表裏玉沙津周迴隱輪跡區別左帶栁汧水右浚陽谷川土懷北邙色井洌鳳門泉迹號郭干跱留岸姜巴亘逺蹤鶴廟或聞響别宅迺恒恭類附吴居非知地越家詎隱遷樹蓋徒低蔭石竈未嘗煙物軌果林鬱餘奈蔬圃蔓遺辛熒芝可燭夜田泉常澣塵遊集降轡龜山客解駕青華童寢宴舍眞館高會蕭閑宫才英清歌翔羽集長嘯歸雲翻子絃有逸調空談無與言學禀摽舍雷平下立靜連石陰上道已冲念飛華當軫心業運濟神既有在去留從所冝心迹何用顯冥途自相知挺契方隅游瓊丒華陽棲隱居重離儻或似七元乃扶胥機萌號期行當滿亥數未終丁迨及唐承世將賔來聖庭誠期刊石玄窻上顯誠曲階門動靜顧矜録不負保舉恩授陸敬游十賚文隱居先生遣總事弟子戴坦乘䇿執簡膝授前學弟子吴郡陸敬游建連石之邑爲棲靜處士策文曰咨爾敬游昔我紆紱帝闈侍笏梁席雖迹混教塗而心摽逸境芝田之想無忘曉夜濠頴之志歲月以深至德有鄰雲風相會爾之來矣爰移兩春於是褫帶青墀挂冠朱闕携手東驅創居兹嶺脉潤通水徙石開基登崖斲榦越壟負卉筋力盡於登築炁血疲乎趨走肌色憔悴不以暴露爲苦心魂空慊寧顧飢寒之弊棟宇旣立載離霜暑于時七稔經始甫訖今日之安爾有勤焉君子不獨居其榮仁人必與物同泰是用邑爾長阿北阪積金山連石之鄉方七十步澗水屬焉茂爾嘉業永爲華陽上賔爾其蒞之右一爾以專慤爲性恬淡爲情質直居本沉重樹志不邀世才高謝接俗權謀詭譎非意所欲今故賚爾爲棲靜處士可謂因德立號克終斯美右二爾基架館境營獲授域堂壇宏敞棲路通嚴官私行止並有棲憩繕築之勞莫匪爾力今故賚爾四雷飛軒厢廊側屋可以安身靜卧顯衹遐福右三爾奉上惟勤接下以惠稼穡艱難備嘗勞苦貨植之冝允瞻糧服手足胼胝未獲告休櫛沐風雨於焉猶切今故賚爾蒼頭一人厥名多益可以傳代薪水省息劬劇右四爾族惟舊緒身沗邦聞道雖一貫事冝望分今故賚爾銅鐵如意可以麾對賔僚即名立事右五爾崇教惟善法無偏執器服表用爰寄玩習今故賚爾筇竹錫杖可以振動三界精衹憚響右六爾期誠玄契遐想靈風致懷所指因心則通今故賚爾香爐二枚薰陸副之可以騰煙紫閣招感上司右七爾澡形潔蔵餚糧旣去宣道松术實資芳醑今故賚爾杯盤一具可以夕挹桂漿朝承菊露右八爾敬事經誥遵尚模楷翰墨之用於是乎在今故賚爾大硯一面紙筆副之可以臨文寫字對眞受言右九爾眞心内固清行外彰滌蕩紛穢表裏雪霜今故賚爾鍮石澡灌手巾自副可以登齋朝拜出入盥漱右十今賚爾十事事准前史可對揚嘉策循言來理無或驕惰以騫斯㫖援筆申懷敢告處士詔問山中何所有賦詩以答山中何所有嶺上多白雲只可自怡悅不堪持寄君題所居壁夷甫任散誕平叔坐談空不言昭陽殿忽作單于宫寒夜愁夜雲生夜鴻驚悽切嘹唳傷夜情空山霜滿高煙平鉛華沉照帳孤明寒月微寒風緊愁心絶愁淚盡人情不勝怨思來誰能忍胡笳篇自戾飛天曆與奪徒紛紜百年四五代終是甲辰君上梁武帝論書啟奉㫖左右中書復稍有能者唯周喜贊夫以含心之荄實俟夾鍾吐氣今既自上體妙爲下理用成工每惟申鍾王一論於天下進藝方興所恨臣沈朽不能鑚仰高深自懷歎慕前奉神筆三紙并今爲五非但字字注目乃畫畫抽心日覺勁媚轉不可說以酬昔歲不復相類正此即爲楷何復多尋鍾王臣心本自敬重今者彌增愛服俯仰悅豫不能不以啓適復蒙給二卷伏覽標帖皆如聖㫖旣不顯垂允少留不能久停已就摹索者一叚未畢不赴今信紙卷先已經有兼多他雜無所復取亦請俟俱了日奉送兼此諸書是篇章體臣今不辯復得修習唯願細書如樂毅論太師箴例依倣以寫經傳永存冥題中精要而已梁武帝答書近二卷欲少留差不爲異紙卷是出裝書旣須見前所以付耳無正可取備於此及欲更須細書如論箴例逸少迹無甚極細書樂毅論乃微麤徤恐非眞跡太師箴小復方媚筆力過嫩書體乖異二者已經至鑒其外便無可付也上梁武帝啟樂毅論愚心近甚疑是摹而不敢輕言今㫖以爲非眞竊自信頗涉有悟箴吟贊過爲淪弱許靜素叚遂蒙永給仰銘矜奬益無以喻如此書雖不在法例而致用理均背間細楷兼復兩翫先於都遇得飛白一卷云是逸少好跡臣不嘗别見無以能辯唯覺勢力驚絶謹以上呈於臣非用脫可充閣願仍以奉上臣昔於馬澄處見逸少正書目録一卷澄云右軍勸進洛神賦諸書十餘首皆作今體唯急就篇二卷古法緊細近脫憶此語當是零落已不復存澄又云帖注出裝者皆擬賚諸王及朝士臣近見三卷首帖亦謂已久分本不敢議此正復希於三卷中一兩條更得預出裝之例耳天㫖遂復頓給先卷下情益用悚息近初見卷題云二十三四已欣其多今者賜書第至二百七十惋訝無已天府如海非一瓶所汲量用息心前後都已蒙見大小五卷於野拙之分實以過幸若非殊恩豈可觖望愚固本博涉而不能精昔患無書可看乃願作主書史晩愛隸法又羨典掌之人嘗言人生數紀之内識解不能周流天壤區區唯充恣五欲實可耻愧每以爲得作才鬼亦當胜於頑仙至今猶然始欲翻之自無射以後國政方殷山心歉默不敢復以虛閑塵觸謹於此題事故遂成煩黷伏願聖慈照録誠慊梁武帝答陶隱居諭書又省别疏云故當冝微以著賞此既勝事雖風訓非嫌云云然非所習聊試略言夫運筆邪則無芒角執手寬則書緩弱點撆短則法擁腫點撆長則法離澌畫促則字横畫踈則形慢拘則乏勢放又少則純骨無媚純肉無力少黑浮澁多墨笨鈍比並皆然任之所之自然之理也若抑揚得所趣舍無違值筆連斷觸勢峰鬱揚波折節中規合矩分間下注濃纖有方肥瘦相和骨力相稱婉婉曖曖視之不足稜稜凛凛常有生氣適眼合心便爲甲科衆家可識亦當復貫串耳六文可工亦當復由習耳一聞能持一見能記且古且今不無其人大抵爲論終歸是習程邈所以能變書體爲之舊也張芝所以能善書工學之積也旣舊旣積方可以肆其談吾少來乃至不嘗盡甲子無論於篇紙老而言之亦復何謂正足見嗤於當今貽笑於後代遂有獨冠之言覽之背熱隱眞於是乎累眞矣此直一藝之工非吾所謂勝事此道心之塵非吾所謂無欲也又上梁武帝論書啟一一卷中有雜迹謹䟽注如别恐未允愚衷並竊所摹者亦以上呈近十餘日精慮悚悸無寧涉事遂至淹替不冝復待填畢餘條並非用唯叔夜威輦二篇是經書體式追以單郭爲恨伏按卷上第數甚爲不少前㫖唯有四卷此似是宋元嘉中撰集當由自後多致散失逸少有名之迹不過數首黃庭勸進像讚洛神此等不審猶有存否第二十三卷今見有十二條在别紙按此卷是右軍書者唯有八條前樂毅論書乃極勁利而非甚用意故頗有壞字太師箴大雅吟用意甚至而更成小拘束乃是書扇題屏風好體其餘五片無的可稱臣濤言一紙此書乃不惡而非右軍又不識誰迹又似是摹給事黄門二紙治廉瀝一紙是子敬書亦似摹跡後又治癧貍骨方一紙是子敬書亦是摹跡右四件非右軍書第二十四卷今見有二十一條在按此卷是右軍書者唯有十一條並非甚合迹兼多漫抹於摹起難復委曲前黄初三年一紙是後人學右軍繆襲告墓文一紙是許先生書抱懷憂痛一紙是張澄書五月十一日一紙是摹王珉書被涵尚想黄綺一紙遂結滯一紙凡二篇並後人所學甚拙惡不復展一紙是子敬書便復改月一紙是張翼書五月十五日繇白一紙亦是王珉書治欬方一紙是謝安書右一十條非右軍書伏恐未垂許以區别今謹上許先生書任靜書如别比方即可知王珉張澄謝安張翼書公家應用梁武帝答隱居書省區别諸書良有精賞所異同所可未知悉可否耳給事黄門二紙爲任靜書觀所送靜書諸字相附近二紙靜書體解雜便當非靜書復當以點盡波擎論極諸家之致此亦非可倉卒運於毫紙且保拙守中也許任二迹並摹者並付反又上梁武帝論書啟啓伏覽書前意雖止二六而規矩必周後字不出二百亦褒貶大備一言以蔽便書情頓極使元常老骨更蒙榮造子敬懦肌不沉泉夜唯逸少得進退其間則玉科顯然可觀若非聖證品析恐愛附近習之風永遂淪迷矣伯英旣稱草聖元常寔自隸絶論㫖所謂殆同機神實曠世莫繼斯理旣明諸畫虎之徒當日就輟筆反古歸眞方弘盛世愚管見預聞喜佩無届比世皆尚子敬敬元末繼以齊代名實脫略海内非唯不復知有元常於逸少亦然非排棄所可黜涅而不緇不過數族今奉此論自舞自蹈未足逞泄願以所摹竊示洪逺思曠此二人皆是均思者必當賛仰踴躍有盈半之益臣與洪逺雖不相識從子翊以學徃來故因之有會但旣在閣恐或已應聞知摹者所採字大小不堪均調郭看乃尚可恐筆意大殊此篇方傳千載故冝令跡隨矣偕老美晩所奉三紙伏循字跡大覺勁宻竊恐旣以言發意意則應言而心隨意運手與筆會故益得楷稱下情懽仰寶奉愈至世論咸云江東無復鍾跡常以歎息皆竚望中原廓清太丘之碑可就摹採今論㫖云眞迹雖少可得而推是猶有存者不審可復幾字旣無出見理冒願得工人摹填數行脫蒙見此實爲過幸又逸少學鍾勢巧形宻勝於自運不審此例復有幾紙垂㫖以黄庭像讚等諸文可更有出給理自運之跡今不復希請學鍾妙仰惟殊恩梁武帝答書鍾書乃有一卷傳以爲眞意謂悉是摹學多不足論有兩三行許似摹微得鍾體逸少學鍾的可知近有二十許首此外字細畫短多是鍾法今欲令人帖採未便得付來月有竟者當遺送也論書啟逸少自吴興以前諸書猶爲未稱凡厥好迹皆是向會稽時永和十許年中者從失郡告靈不仕以後畧不復自書皆使此一人世中不能别見其緩異呼爲末年書逸少亡後子敬年十七八全倣此人書故遂成與之相似今聖㫖摽顯足使衆識頓悟於逸少無末年之譏阮研聞近有一人學研書遂不復可别臣比郭摹所得雖麤寫字形而無復其用筆跡勢不審前後諸卷一兩條謹宻者可得在出裝之例復蒙垂給至年末間否此澤自天直以啓審非敢必覬答朝士訪仙佛兩法體相書初梁諸朝散大夫問曰嘗竊觀仙書輒嗟欣忘倦徒羨其文莫測其理尋七尺之體旣同禀太始俱服五常以何因縁獨超青雲而弊金石者乎先生領神玄門學窮仙苑必有以竭其川岸請略聞雅說隱居答曰至哉嘉訊豈蒙生所辯雖然試言之若直排竹栢之匹桐柳者此本性有殊非今日所論若引庖刀湯榢從養漑之功者此又止其所從終无永固之期夫得仙者並有異乎此但斯族復有數種今且談其正體凡質像所結不過形神形神合時是人是物形神若離則是靈是鬼其非離非合佛法所攝亦離亦合仙道所依今問以何能而致此仙是鑄鍊之事極感變之理通也當埏埴以爲器之時是土而異於土雖燥未燒遇濕猶壞燒而未熟不久尚毁火力既足表裏堅固河山可盡此形無滅假令爲仙者以藥石鍊其形以精靈瑩其神以和氣濯其質以善德解其纏衆法共通無礙無滯欲合則乘雲駕龍欲離則尸解化質不離不合則或存或亡於是各隨所業脩道進學漸階無窮教功令滿亦異竟寂滅矣登眞隱訣序昔在人聞已鈔撰眞經脩事兩卷于時亦麤謂委宻頃巖居務靜頗得恭潔試就遵用猶多闕畧今更反覆研構表裏洞洽預是眞學之理使了然無滯一字一句皆有事㫖或論有以入無或據顯而知隱或推機而得宗或引彼以明此自非閑鍊經書精涉道數者率然覽之猶觀海爾必須詳究委曲乃當曉其所以故道備七篇義同高品嘗聞古言非知之難其在行之意謂非學之難解學難也屢見有人得兩三卷書五六條事謂理盡紙上便入山脩用動積歲月愈久愈昏此是未造門墻何由眄其帷席試略問麤處已自茫然皆答言經說止如此但謹依存行耳乃頗復開動端萌序導津流若值智尚許人脫能欣爾感悟詢訪是非至於愚迷矜固者便徑道君何以穿鑿異同評論聖文或有自執己見或云承舊法永無肯發對揚之懷此例不少可爲痛心夫經之爲言徑也經者常也通也謂常通而無滯亦猶布帛之有經矣必須銓綜緯緒僅乃成功若機關疏越杼軸乖謬安能斐然成文眞人立象垂訓本不爲蒙校設言故每標通衢而恒畧曲徑知可教之士自當觀其隅轍凡五經子史爰及賦頌尚歷代注釋猶不能辯况玄妙之秘途絶領之奇篇而可不探括冲隱窮思寂昧者乎旣撰此粗立乃輟書而嘆曰若使願玄平在此乃當知我心理所得幾於天人之際徃矣如何孰與言哉方將寄之於玄會耳藥總訣序上古神農作爲本草凡著三百六十五種以配一歲歲有三百六十五日日生一草草主一病上應天文中應人道下法地理調和五味製成醪醴以備四氣爲弗服欲其本立道生者也當斯之時人心素朴嗜欲寡少設有微疾服之萬全自此之後世僞情澆智慮日生馳求無厭憂患不息故邪氣數侵病轉深痼雖服良藥不愈其後雷公祠君更增演本草二家藥對廣其主治繁其類族旣世改情移生病日深或未有此病而逆設彼藥或一藥以治或百藥共愈一病欲以排邪還正爲之原防故也而三家所列疾病互有盈縮或物異而名同或物同而名異或冷熱乖違甘苦背越採取殊法出處異所若此之流殆難按據尋其大歸神農之時未有文字至於黄帝書記乃興於是神農本草列爲四經三家之說遞有損益豈非隨時適變殊途同歸者乎但本草之書歷代久逺旣靡師授又無注訓傳寫之人遺誤相繫字義殘闕莫之是正方用有驗布舒合和肘後百一方序太歲庚辰隱居曰余宅身幽嶺迄將十載雖每植德施功多止一時之設可以傳芳逺裔者莫過於撰述見葛氏肘後救卒殊足申一隅之思夫生人之所爲大患莫急於疾疾而不治猶救火而不以水也今輦掖左右藥師易尋郊郭之外已自難值况窮村迥野遥山絶浦其間枉夭安可勝言方術之書卷秩徒煩拯濟殊寡欲就披覽回惑多端抱朴此製實爲深益然尚闕漏未盡其善輒更採集補闕凡一百一首以朱書甄别爲肘後百一方於雜病單治略爲用遍矣昔應璩爲百一詩以箴規心行今余撰此蓋欲衛輔我躬且佛經云人用四大成身一大輒有一百一病是故深宜自想上自通人下達衆庶莫不各加繕寫而究括之余又别撰效驗方五卷且論諸病證候因藥變通而並是大治非窮居所資若華軒鼎室亦宜脩省耳葛氏序云可以施於貧家野居然亦不止如是今縉紳君子若常處閑佚乃可披於方書脫從禄外邑將命遐征或宿直禁闈晨宵隔絶或羈束戎陣城栅嚴阻忽遇疾倉卒唯拱手相看曷若採之囊笥則可庸竪成醫故備論證候使曉然不滯一披條領無使過差也本草序隱居在乎茅山巖嶺之上以吐納餘暇頗遊意方技覽本草藥性以爲盡聖人之心故撰而論之舊說皆稱神農本經余以爲信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯夭傷之命此三道者歷衆聖而滋彰文王孔子彖象繫辭幽賛人天后稷伊尹播厥百穀惠被群生歧黄彭扁振揚輔導恩流含氣並歲踰三千民到于今賴之但軒轅以前文字未傳如六爻指垂畫象稼穡即事成迹至於藥性所主當以識識相因不爾何由得聞至于桐雷乃著在於編簡此書應與素問同類但後人多更脩飾之爾秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙𣈆懷奔迸文籍焚靡千不遺一今之所存有此四卷是其本經所出郡縣乃後漢時制疑仲景元化等所記又云有桐君採藥録說其花葉形色藥對四卷論其估使相須魏𣈆已來吴普李當之等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則識智有淺深今輒苞綜諸經研括煩省以神農本經三品合三百六十五爲主又進名醫副品亦三百六十五合七百三十種精麤皆取無復遺落分别科條區畛物類兼注詔時用土地所出及仙經道術所須并此序録合爲七卷雖未足追踵前良蓋亦一家撰製吾去世之後可貽諸知音爾華陽陶隱居集卷上
