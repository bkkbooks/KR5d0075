body:
  text: 昭臺弟子傅霄編集大洞弟子陳桷校勘許長史舊館壇碑悠哉曠矣宇宙之靈也固非言象所傳文跡可記默然則後之人奚聞乎含吐萬有化育羣生本其所由義歸冥昧至於形域區分性用殊品事限觀聽理窮數識者儻或可論山之高海之廣夫何故以其有容焉大天之内復有小天三十六所並拓寓地空亘涂水脉闢闈風岫通氣雲巘此山本號句曲其下是第八洞宫名曰金壇華陽之天周迴一百五十里分置三府前漢元帝世有咸陽三茅君得道來掌此任故稱茅山具詳傳記至𣈆太和元年句容許長史在斯營宅厥迹猶存宋初長沙景王就其地之東起道士精舍梁天監十三年勑貿此精舍立爲朱陽館將逺符先徵定詳火曆於館西更築隱居住址十四年别創鬱崗齋室追玄洲之蹤十七年乃繕勒碑壇仰述眞軌眞人姓許諱穆世名謐字思玄本汝南平輿人後漢靈帝中平二年六世祖光字少張避許相諛俠乃來過江居丹陽句容都鄉之吉陽里後仕吴爲光禄勳識宇亮拔奕葉才明祖尚字元甫有文章機見吴中書郞父副字仲先器度淹通風格清簡𣈆剡令寧朔將軍下邳太守西城侯長史副第五子也正生少知名簡文在藩爲世表之交起家太學博士朝綱禮肆儒論所宗出爲餘姚令懃恤民隱惠被鄰邑徵入凱闈納言帝側升平末除䕶軍長史本郡中正外督戎章内銓茂序遐邦肅律鄉采砥行太和中遷給事中散騎常侍蟬冕輝華事歸尚德簡文踐極方優國老儵值晏駕於焉告退專靜山廬以脩上道君雖搢紱朝班諷議庠塾而心標象外志結霞門第四兄逺遊永和四年嘉遁不反君尚想幽奇歲月彌軫恒與揚君深結神明之契興寧中衆眞降楊備令宣喻龍書雲篆僉然遍該靈謨奧㫖于兹必究年涉懸車遵行愈篤太元元年解駕違世春秋七十有二子姪禮窆虛柩於縣西大墓京陵之蹤未逺飛劔之墩在焉謹按眞誥君挺命所基縁業已久乃周武王世九宫上相長里薛公之弟也兼許肇遺功復應垂祉後胤故乘運託生因資成道玉札所授爲上淸眞人爵登侯伯位編卿司理仙撫治佐聖牧民矣眞傳未顯於世莫得具述楊君諱羲事具眞誥長史第三子諱玉斧世名翽字道翔正生母陶威女先亡巳得在洞府易遷宫中君淸頴瑩潔特絶世倫郡舉上計掾不赴糠粃塵務研精上業即弘景玄中之眞師也恒居此宅繕脩經法楊君數相從就亟通眞感太和五年於兹告逝時年三十眞誥云後十六年當度東華爲上相青童君之侍帝晨受書爲上清仙公與谷希子併職帝晨之仕比世侍中君長兄揆世名甽次兄虎牙世名聯並亦得道揆今有玄孫靈眞在山勑立嗣眞館以褒逺祖之德皇上乘弘誓本力來君此土燾育蒼衹範鑄羣品導法裁俗隨縁開教以隱居積藴三眞經誥久棲華陽宜還舊宅供養修理乃勑工匠建兹堂靖旣仰衹帝則兼闡大猷東位青壇西表素塔壇塔之間通是基址埋領揜瓦投鍤便值紫煙白霧纏徊蔭蓋宅南一井即長史所穿井南大塘乃郭朝遺製源出田公之泉路通姜巴之軌傍枕雷平前瞰下泊東際連崗北横長壟柳汧陽谷俱會西垂四域之内皆謂之金陵地肺者也長史所居尤爲標勝方將駟雲虬而高騁驅奔鶴以追風望洪濤之浩汗睠故都以浸逺古人有言匪作奚傳敢刊石頌永屬來賢渾樞騖氣方衹吐靈依性分境傳識賦形化通八㝢功浹四溟巡跡電滅測體淵停旋區岳立亘海雲舒搏風泳水跡實憑虛亦有幽匠開石架廬情高身麗天府地居縈巒已曲畫壤肺浮五闈面啓九涂環周長隰旁嶺交汧比流廼稱龍伏寔謂金丘昔在西漢三茅來賔爰曁東𣈆二許懷眞裁基浚井棲道接神允膺輔聖錫兹侍晨參差年代絪緼名氏書誥具宣精暉未弭甀甃將淪沉階已毁拱樹霜摧脩庭草委肇館華陽歲躔二紀永觀前猷聿遵鴻軌帝曰楙哉爾焉斯止經之營之輪乎奂矣勝殿宻響瀉瓶楊芬瑶官碧簡絢采垂文瓊函玉檢綺幕繡巾蘭釭烈耀金罏颺薰桐栢雙教方諸兼學並證心淸俱漏身濁離有離無且華且朴結號虛皇筌法正覺藥徵質瑩禪感慧通飛行欻怳捫景帶虹振苦排鄣還明反聰物言是力我見無功紛紜今古汗漫兩儀三相幻惑舟壑自移縁來則應不慮不爲式題龜録人天鑒知呉太極左宫葛仙公之碑道冠兩儀之先名絶萬物之始者固言語所不得辯稱謂所莫能筌焉可以文字述云何以金石傳古其遂休也則日月空照遂默也則生人長昏是故出關導以兩卷將昇犒其五文令懷靈抱識之士知杳冥之有精焉自時厥後奕代間出雲篆龍章之牒炳發於林岫壤辭麗氣之㫖藻蔚於庭筵其可以垂軌範著謡誦者迄于兹辰昔在中葉甘左見駭於魏王象奉擅奇於吴主至如葛仙公之才英俊邁蓋其尤彰彰者矣公於時雖歷遊名岳多居此嶺此嶺乃非洞府而跨據中川東視則連峰入海南眺則重嶂切雲西臨江滸北旁郊邑斯潜顯之奥區出處之關津半尋石井日汲莫測其源三足白麂百齡不異其質精靈之所弗渝神衹之所司衛麻衣史宗之儔相繼棲託後有孫慰祖亦嗣居彌歲山陰潘洪字文盛少秉道性志力剛明前住餘姚四明隩國爲立觀直上百里榛途險絶旣術識有用爲物情所懷天監七年郡邑豪舊遂相率輿出制不由已以此山在五縣衝要舍而留止于兹十有五載將欲移憩壇上先有一空碑久已摧倒洪意以爲蔭其樹者尚愛其枝况仙公眞聖之遺蹤而可遂淪乎廼復建新碑於其所願勒名迹以永傳隱居不逺千里寓斯石而鑴之仙公姓葛諱玄字孝先丹陽句容都鄉吉陽里人也本屬琅耶後漢驃騎僮侯廬讓國於弟來居此土七代祖艾即驃騎之弟襲封僮侯祖矩安平太守黃門郞從祖彌豫章等五郡太守父焉字德儒州主簿山陰令散騎常侍大尚書代載英哲族冠吴史公幼負奇操超絶倫黨神挺標峻精暉卓逸墳典不學而知道術纔聞已了非復軌儀所範思識所該特以域之情理之外置之言象之表而已吴初左元放自洛而來授公白虎七變爐火九丹於是五通具足化道無方孫權雖愛賞仙異而内懷猜害翻琰之徒皆被挫斥敬憚仙公動相諮禀公馳涉川嶽龍虎衛從長山蓋竹尤多去來天台蘭風是焉遊憩時還京邑視人如戲詭譎倜儻縱倒河山雖投鳧履墜叱羊石起篾以加焉于時有人漂海隨風眇漭無垠忽值神島見人授書一函題曰寄葛仙公令歸吴達之由是舉代翕然號爲仙公故抱樸著書亦云余從祖仙公乃抱朴三代從祖也俗中經傳所談云已被太極銓授居左仙公之位如眞誥并葛氏舊譜則事有未符恐教迹參差適時立說猶如執戟侍䏶豈謂三摘靈桃徒見接神役鬼安知止在散職一以權道推之無所復論其同異矣仙公赤烏七年太歲甲子八月十五日平旦昇仙長徃不返恒與郭聲子等相隨久當授任玄都衹秩天爵佐命四輔理察人衹瞻望舊鄉能無纍纍之歎顧盻後學庶垂汲引之慈敢藉邦族末班仰述眞仙遺則云爾九陔夐絶七度虛懸分空置境聚炁構天物滋數後化起象前命隨形轉神寄業傳霜野於衰竹栢翠微泉墟共徃彭羡獨歸生因事攝年以學祈如金在冶如帛在機仙公珪警臨齠發頴襄童比跡項孺聯影濯質綺闈凝心黛嶺虎變已攄龍輈遂騁竭來臺霍偃蹇蘭穹碧壇自肅玉水不窮巡芳沐道懷古惻衷表兹峻碣永扇高風蘭風寓憩已勒豐碑此土舊居未鑴貞琰今之遠裔仰慕淸塵敬思刊樹傳芳來葉解官表臣聞堯風沖天頴陽振飲河之談漢德括地商陰峻餐芝之氣臣棲遲早日簮帶久年仕豈留榮學非待禄恒思懸纓象闕孤耕壟下席月澗門横琴雲際始奉中恩得遂丘壑今便滅影桂庭神交松友一出東闕故鄉就望睠言興念臨波瀉淚臣舟棹巳遄無容躬詣不任仰戀之誠謹奉表以聞詔答卿遺累却粒尚想清虛山中閑靜得性所樂當善遂嘉志也若有所須便可以聞仍賜帛十疋燭二十挺又别勑朕月給上茯苓五斤白蜜二斗以供服餌進周氏冥通記啟某啓去十月將末忽有周氏事旣在齋禁無由即得啓聞今謹編成事迹凡四卷如别上呈但某覆鄣疑網不早信悟追自咎悼分貽刻責淵文口具陳述伏願宥以闇惰謹啓詔答省䟽並見周氏遺迹眞言顯然符驗前誥二三明白益爲奇特四卷今留之見淵文并具一二唯增降歎告遊篇性靈昔旣肇縁業久相因即化非冥滅在理淡悲欣冠劔空衣影鑣轡乃仙身去此昭軒侣結彼瀛臺賔儻能踵留轍爲子道玄津殘文雲上之仙風賦縹緲遥裔亘碧海而颺朝霞凌青煙而溥天際出龍門而激水度葱關以飛雪於是漢區動御月軌驚文浮虛入景登空泛雲一舉萬里鲁不浹辰此列子有待之風也若乃緜括宇宙苞絡天維周流八極迴環四時氣值節而動律位涉巽而離箕徒見去來之緒莫測終始之期此太虛無爲之風也茅山長沙館碑夫萬象森羅不離兩儀之育百法紛凑無越三教之境榗紱之士飾禮容於闈閤耿介之夫揚旌麾於山裔銘曰大哉乾元萬物資始皇王受命三才乃理惟聖感神惟神降祉德被歌鍾名昭圖史友于兄弟敬惟西宣言追茂實用表遺先敢巡奮制有革雜章刊石弗朽奕代留芳太平山日門館碑日門館者東霞啓暉開巖引燭以爲名也先是吴郡杜徵君聲高兩代德冠四區教義宣流播乎數郡拓宇太平之東結架菁山之北爰以此處幽奇别就基構棲集有道多歷世年茅山曲林館銘層嶺外峙邃宫内映仄穴旁通縈泉逺鏡尚德依仁祈生翊命且天且地若凡若聖連甍比棟各謂知道參差經術跌宕辭藻孰如曲林獨爲勁好掩跡韜功守兹偕老答謝中書書山川之美古來共談高峰入雲清流見底兩岸石壁立色交暉青林翠竹四時俱備曉霧將歇猿鳥亂鳴夕日欲頽沈鱗競躍實是欲界之仙都自康樂以來未復有能與其奇者答虞仲書棲玄翮於荆枝望綺雲於青漢者有日于兹矣而春華來被草石開鮮辭動情端志交衿曲信知鄰德之談無虛徃櫝夫子雖迹躔朱閣而心期岱嶺豈但散髮乎高岫以將飛霜於絶谷良爲欽哉野人幸得託形崇阜息影長林每對月流歎臨風軫慨徒事累可豁而髮容難待自非齊生死於一致者能不心熱者乎舉世悠悠孰云同此儻遇知己相與共憂朅來虞公兹焉可邁何爲棲棲空勞鼓缶迨及暇日有事還童不亦皎潔當年而無忸前脩也答趙英才書子架學區中飛才何外不肯掃門覓仕復懶彈鋏求通故偃蹇園巷從容郊邑昔所謂傲賔者此其是乎巖下鄙人守一介之志非敢蔑榮嗤俗自致雲霞蓋任性靈而直徃保無用以得閑壠薪井汲樂有餘歡切松煑术此外何務然亦以天地棟宇萬物同於一化死生善惡之能聞相經序相者蓋性命之著乎形骨吉凶之表乎氣貎亦猶事究謀而後動心先動而後應表裏相感莫知所以然且富貴壽夭各值其數董賢甫在弱冠便位過三公貲半於國而纔出三十身摧家破馮唐袴穿郞署揚雄壁立高閣而並至白首或垂老玉食而官不過尉史或頴惠若神僅至齠齔或不辯菽麥更保黃耇此又明其偏有得也華陽陶隱居集卷下二篇同卷尊六宗玄先生玄綱論南統大君內丹九章經進玄綱論表道士臣筠言臣聞道資虛契理藉言彰臣曩棲巖穴之時輙撰修行之事伏以重玄深而難賾其奥三洞祕而罕窺其門使向風之流浩蕩而無據遂總括樞要謂之玄綱冀循流泒而可歸其源闡幽微而不泄其㫖至於高虛獨化之兆至士登仙之由或前哲未論眞經所略用率鄙思列于篇章伏惟開元天寶聖文神武證道孝德皇帝䏶下爲至道之主弘自然之訓品物咸熈於陶鈞之際黎元輯寧於仁壽之域豈纖塵有裨於崇嶽爝火能助於太陽然蒭蕘雖微明聖不棄敢陳菲薄希燭天光所述舊文謹隨表奉進輕瀆宸扆伏增戰越臣筠誠惶誠恐頓首頓首謹言天寶十三載六月十一日中嶽嵩陽觀道士臣筠表上宗玄先生玄綱論上篇明道德凡九章道德章第一道者何也虛無之系造化之根神明之本天地之源其大無外其微無内浩曠無端杳冥無對至幽靡察而大明垂光至靜無心而品物有方混漠無形寂寥無聲萬象以之生五音以之成生者有極成者必虧生生成成今古不移此之謂道也德者何也天地所禀陰陽所資經以五行緯以四時牧之以君訓之以師幽明動植咸暢其宜澤流無窮羣生不知謝其功惠加無極百姓不知賴其力此之謂德也然則通而生之之謂道道固無名焉畜而成之之謂德德固無稱焉嘗試論之天地人物靈仙鬼神非道無以生非德無以成生者不知其始成者不見其終探奥索隱莫窺其宗入有之末出無之先莫究其眹謂之自然自然者道德之常天地之綱也元氣章第二太虛之先寂寥何有至精感激而眞一生焉眞一運神而元氣自化元氣者無中之有有中之無曠不可量微不可察氤氲漸著混茫無倪萬象之端兆眹于此於是清通澄朗之氣浮而爲天濁滯煩昧之氣積而爲地平和柔順之氣結而爲人倫錯謬剛戾之氣散而爲雜類自一氣之所育播萬殊而種分既涉化機遷變罔窮然則生天地人物之形者元氣也授天地人物之靈者神明也故乾坤統天地精魂御人物氣有陰陽之革神無寒暑之變雖羣動紏紛不可勝紀滅而復生終而復始道德之體神明之心應感不窮未嘗疲於動用之境矣眞精章第三天地不能自有有天地者太極太極不能自運運太極者眞精眞精自然惟神惟明寔曰虛皇高居九清乃司玄化總御萬靈乾以之動坤以之寧寂默無爲羣方用成空洞之前至虛靡測元和澄正自此而植神眞獨化匪惟巨億仰隸至尊咸有所職丹臺瑶林以游以息雲漿霞饌以飲以食其動非心其翔非翼聽不以耳聞乎無窮視不以目察乎無極此皆無祖無宗不始不終含和藴慈愍俗哀蒙清濁體異眞凡莫同降氣分光聿生人中賢明博達周濟爲功爲君爲長俾物咸通爰歷世紀玄勳允充德掞天壤名書帝宫於是運絶北都命標南府元眞乃降是爲形主陰氣旣落世塵自阻鍊胎易質革穢除腐神形合契白日輕舉所謂反我鄉歸我常與道無疆而孰知其方天禀章第四夫道本無動靜而陰陽生焉氣本無清濁而天地形焉純陽赫赫在乎上九天之上無陰也純陰冥冥處乎下九地之下無陽也陰陽混蒸而生萬有生萬有者正在天地之間矣故氣象變通晦明有類陽以明而正其粹爲眞靈陰以晦而邪其精爲魔魅故禀陽靈生者爲睿哲資陰魅育者爲頑兇睿哲惠和陽好生也頑兇悖戾陰好殺也或善或否二氣均合而生中人三者各有所禀而教安施乎教之所施爲中人爾何者睿哲不教而自知頑兇雖教而不移此皆受陰陽之純氣者也亦猶火可滅不能使之寒冰可消不能使之熱理固然矣夫中人爲善則和氣應爲不善則害氣集故積善有餘慶積惡有餘殃有慶有殃教於是立性情章第五夫生我者道禀我者神而壽夭去留匪由於巳何也以性動爲情情反於道故爲化機所運不能自持也將超跡於存亡之域棲心於自得之鄉道可以爲師神可以爲友何爲其然乎夫道與神無爲而氣自化無慮而物自成入於品彙之中出乎生死之表故君子黜嗜慾隳聰明視無色聽無聲恬澹純粹體和神清虛夷忘身乃合至精此所謂返我之宗復與道同與道同則造化莫能移鬼神莫能知而況於人乎超動靜章第六夫道至無而生天地天動也而北辰不移含氣不虧地靜也而東流不輟興雲不竭故靜者天地之心也動者天地之氣也心靜氣動所以覆載而不極是故通乎道者雖翱翔宇宙之外而心常寧雖休息毫釐之内而氣自運故心不寧則無以同乎道氣不運則無以存乎形形存道同天地之德也是以動而不知其動者超乎動者也靜而不知其靜者出乎靜者也故超乎動者陽不可得而推出乎靜者陰不可得而移陰陽莫能變而況於萬物乎故不爲物之所誘者謂之至靜至靜然後能契於至虛虛極則明明極則瑩瑩極則徹徹者雖天地之廣萬物之殷而不能逃於方寸之鑒矣同有無章第七夫道包億萬之數而不爲大貫秋毫之末而不爲小先虛無而不爲始後天地而不爲終昇積陽而不爲明淪重陰而不爲晦本無神也虛極而神自生本無氣也神運而氣自化氣本無質凝委而成形形本無情動用而虧性形成性動去道彌逺故溺於生死遷於陰陽不能自持非道存而亡之也故道能自無而生於有豈不能使有同於無乎有同於無則有不滅矣故生我者道滅我者情苟忘其情則全乎性性全則形全形全則氣全氣全則神全神全則道全道全則神王神王則氣靈氣靈則形超形超則性徹性徹則返覆流通與道爲一可使有爲無可使虛爲實吾將與造物者爲儔奚死生之能累乎化時俗章第八道德者天地之祖天地者萬物之父帝王者三才之主然則道德天地帝王一也而有今古澆淳之異堯桀治亂之殊者何也夫道德無興衰人倫有否泰古今無變易性情有推移故運將泰也則至陽眞精降而爲主賢良輔而姦邪伏矣時將否也則太陰純精升而爲君姦邪弼而賢良隱矣天地之道陰陽之數故有治亂之殊也所以古淳而今澆者亦猶人幼愚而長慧也嬰兒未孩則上古之含純粹也漸有所辯則中古之尚仁義也成童可學則下古之崇禮智也壯齒多欲則季世之競浮僞也變化之理時俗之宜故有澆淳之異也覈其所以源其所由子以習學而性移人以隨時而朴散雖然父不可不教於子君不可不治於人教子在乎義方治人在乎道德義方失則師友不可訓道德喪則禮樂不可理雖加以刑罰益以鞭楚難制於姦臣賊子矣是以示童蒙以無誑則保於忠信化時俗而以純素則安於天和故非執道德以撫人者未聞其至理者也明本末章第九夫仁義禮智者帝王政治之大綱也而道家獨云遺仁義薄禮智者何也道之所尚存乎本故至仁合天地之德至義合天地之宜至禮合天地之容至智合天地之辯皆自然所禀非企羡可及矯而效之斯爲僞矣僞則萬詐萌生法不能理也所以貴浮古而賤澆季内道德而外仁義先素朴而後禮智將敦其本以固其末猶根深則條茂源濬則流長非棄仁義薄禮智也故道喪而猶有德德衰而猶有仁仁虧而猶有義義缺而猶有禮禮壞則繼之以亂而智適足以憑陵天下矣故禮智者制亂之大防也道德者撫亂之宏綱也然則道德爲禮之本禮智爲道之末執本者易而固持末者難而危故人主以道爲心以德爲體以仁義爲車服以禮智爲冠冕則垂拱而天下化矣若尚禮智而忘道德者所爲有容飾而無心靈則雖乾乾夕惕而天下敝矣故三皇化之以道五帝撫之以德三王理之以仁義五伯率之以禮智故三皇爲至治五伯鄰至亂故捨道德而專任禮智者非南面之術是以先明道德道德明則禮智薄矣老子曰禮者忠信之薄而亂之首以智治國國之賊不以智治國國之福此謂禮虧則亂智變則詐故塞其亂源而絶其詐根而揚雄班固之儔咸以道家輕仁義薄禮智而專任清虛者蓋世儒不達玄聖之深㫖也中篇辯法教凡一十五章神道設教章第十九玄之初二象未構靈風集妙空洞凝華寶章結於混成玉字標於獨化挺乎有無之際焕乎玄黄之先日月得之以照臨乾坤資之以覆載於是無上虛皇命元始天王編之於金簡次之於玉章初祕上玄末流下土降鑒有道乃錫斯文故伏羲受圖軒轅受符高辛受天經大禹受洛書神道設教兆於兹矣又玄元愍俗歷爲帝師人倫澆浮則陳道德以示朴鬼神雜擾則演盟威以盪邪爰及蘇茅周王裴魏楊許莫不躬接玄聖親傳寶經故西臺無隱於靈文東華不秘於眞訣是以龍章雲篆漸降人間師資相承經法彌廣然可以周覽難可以盡行何者以一人之心兼累聖之道神疲形倦莫究其微故周覽以絶疑約行以取妙則不虧於修習無廢於閑和道在至精靡求其博爾學則有序章第十一道雖無方學則有序故始於正一次於洞神棲於靈寶息於洞眞皆以至靜爲宗精思爲用齋戒爲務慈惠爲先故非至靜則神不凝非精思則感不徹非齋戒則眞不應非慈惠則功不成神凝感徹眞應功成者是謂陟初仙之階矣然後吐納以鍊藏導引以和體怡神以寶章潤骨以瓊醴皆承奉師訣研味眞奥則氣液通暢形神合同不必金丹玉芝可俟雲軿羽蓋矣若獨以嘘吸爲妙屈伸爲要藥餌爲事雜術爲利者可謂知養形不知寶神矣不知寶神者假使壽同龜鶴終無冀於神仙矣陽勝則仙章第十二陽與陰并而人乃生魂爲陽神魄爲陰靈結胎運氣育體搆形然勢不俱全全則各𨑰其本故陰勝則陽竭而死陽勝則陰銷而仙柔和慈善貞清者陽也剛狠嫉惡婬濁者陰也心澹而虛則陽和襲意躁而欲則陰氣入明此二者制之在我陽勝陰伏則長生之漸也漸也者陟道之始不死之階也虛明合元章第十三道不欲有心有心則眞氣不集又不欲苦忘心苦忘心則客邪來舍在於平和恬澹澄靜精微虛明合元有感必應應而勿取眞僞斯分故我心不傾則物無不正動念有屬則物無不邪邪正之來在我而已雖所尚虛漠遺形能慮非精感遐徹則不能通玄致眞故上學之士怠於存念者陰尸之氣勝也忻於勤銳者陽和之神勝也一怠一勤者其戰未决也决之者在於尅節勵操務違懈慢之意使精專無輟於斯須久於其事者則尸銷而神王神王者謂之陽勝陽勝者道其鄰乎以陽鍊陰章第十四陽火也陰水也冰炭不同器勝負各有所歸道俗反其情人各有所鍊衆人則以陰鍊陽道者則以陽鍊陰陰鍊陽者自壯而得老自老而得衰自衰而得耄自耄而得疾自疾而得死陽鍊陰者自老而反嬰自濁而反清自衰而反盛自麤而反精自疾而反和自夭而反壽漸合眞道而得仙矣是以有纖毫之陽不盡者則未至於死有錙銖之陰不滅者則未及於仙仙者超至陽而契眞死者淪太陰而爲鬼是謂各從其類所以含元和抱淳一吐故納新屈伸導引精思靜默瀟灑無欲者務以陽靈鍊革陰滯之氣使表裏虛白洞合至眞久於其事者仙豈逺乎哉形動心靜章第十五夫形動而心靜神凝而跡移者無爲也閑居而神擾恭默而心馳者有爲也無爲則理有爲則亂雖無爲至易非至明者不可致也夫天地晝亦無爲夜亦無爲無爲則一而理亂有殊者何哉晝無爲以明故衆陽見而羣陰伏夜無爲以晦故羣陰行而衆陽息是以主明而無爲者則忠良進姦佞匿而天下治也主闇而無爲者則忠良隱姦佞職而天下亂也故達者之無爲以慧蔽者之無爲以昏慧則通乎道昏則同乎物道與物俱無爲也奚可以一致焉故至人雖貴乎無爲而不可不察也察而無爲者眞可謂無爲也神清意平章第十六上學之士時有高興遠寄陶然於自得之境爲眞仙可接霄漢可昇者神之王也雖曰神王猶恐陽和之氣發泄陰邪之氣乘襲耳可入靜室夷心抑制所起靜默專一則神不散而陽靈全愼無恣其樂康之情以致陰邪之來耳古人所謂樂往則哀來陽衰則陰勝若有時躁競而煩悖者此乃形中諸魄爲陽靈之氣所鍊陰尸積滯將散故擾於絳宫之眞矣可入室靜慮存一握固激其滓濁候神清氣平然後省巳悔過務令自新則轉合於虛靜之途此亦洗心之一術爾行清心貞章第十七行欲清心欲貞言勿過乎行行無愧乎心則遊於四達之衢四達之衢者涉道之通逵也行之不已則天地愛之神明祐之凶横無由加鬼神不能擾若言清而行濁名潔而跡污雖醜蔽於外而心慙於内心慙於内者天地疾之神明殛之雖力强於道不可致也故寧受人之毁無招天之譴人毁由可弭天譴不可逭也眞人爲儔章第十八道之所至忌者婬殺陰賊此誠易戒至於小小喜怒是非可否人之常情甚難愼也都不欲有纖芥之事關乎方寸之中慮靜神閑則邪氣不能入我志不擾則眞人爲儔又好譽而憎毁者賢達之所不免然審巳無善而獲譽者不祥省躬無疵而獲謗者何傷以此論之得失在乎巳而靡由其他故泰然忘情美惡不動乎衷者至人哉至人哉仁明貞靜章第十九夫仁明而貞靜博達而英秀者皆天人分氣降生以濟時利物也積世功備則丹臺著名元貞潜運於上玄正氣宻集於關府自然魄鍊而尸滅神凝而體清陰滓都銷則合形而輕舉故古之仙者未始非天人也使行尸同其所好不亦難乎有積修累行而不獲昇舉者何也前功未著也有不因修習而自得仙者往行克充也夫功無虛搆善不徒施不可見爲而不得則於我生怠覩自然羽化則謂功不由人皆失之遠矣立功改過章第二十功欲陰過欲陽功陰則能全過陽則可滅功不全過不滅仙籍何由書長生非可冀然功不在大遇物斯拯過不在小知非則悛不必馳驟於立功奔波於改過過在改而不復爲功惟立而不中倦是謂日新其德自天祐之若爾者何必八節三元言功悔過神眞明察固其常焉又謝過祈思務在精誠懇志注心於三清之上如面奉金闕之前不必屈伏形體宣通言辭若徒加拜跪扣搏誦課平常之文者可謂示人以小善實未爲感激之弘規耳制惡興善章第二十一陽之精曰魂與神陰之精曰尸與魄神勝則爲善尸强則爲惡制惡興善則理忘善縱惡則亂理久則尸滅而魄鍊亂久則神逝而魂銷故尸滅魄鍊者神與形合而爲仙神逝魂銷者尸與魄同而爲鬼自然之道也虛白其志章第二十二神魂好潔尸魄好穢常欲虛白其志澡雪其形則神魂樂康尸魄鍊滅神康尸滅者日益清爽雖未輕舉吾必謂之仙矣又悲哀感恚者與陰爲徒歡悅忻康者與陽爲徒故心悲則陰集志樂則陽散不悲不樂恬澹無爲者謂之元和非元和無以致其道也委心任運章第二十三夫目以妖艷爲華心以聲名爲貴身好輕鮮之飾口欲珍奇之味耳歡妙美之聲鼻悅芳馨之氣此六者皆敗德傷性秪以伐其靈根者也故有之即可逺無之不足求惟衣與食人之所切亦務道者之一弊耳然當委心任運未有不給其所用且天地之生禽獸也猶覆之以羽毛供之以蟲粒而況於人乎必在忘其所趣任之自然爾虛凝靜息章第二十四覺與陽合寐與陰並覺多則魂彊寐久則魄壯魂彊者生之徒魄壯者死之徒若餐元和徹滋味使神清氣爽至於晝夜不寐唯虛凝而靜息者善無以加焉下篇析凝滯凡九章會天理章第二十五或問曰夫人之心久任之則浩蕩而忘返頓棲之則超躍乎無垠任之則弊乎我性棲之則勞乎我神使致道者奚方而靜愚應之曰性本至凝物感而動習動滋久胡能遽寧既習動而播遷可習靜而恬晏故善習者寂而有裕不善習者煩而無功是以將躁而制之以寧將邪而閑之以貞將求而抑之以捨將濁而澄之以清優哉游哉不欲不營然後以玄虛爲境域以澹漠爲城闕以太和爲宫觀以寂照爲日月惟精惟微不廢不越行如是息如是造次於是逍遥於是習此久者則物冥乎外神鑒於内不思靜而已靜匪求泰而彌泰即動寂兩忘而天理自會矣故履霜乃堅冰之始習靜爲契道之階古人豈不云乎積習生常其斯之謂歟畏神道章第二十六或問曰人有善惡天地神明豈悉知之乎愚應之曰是何言歟是何言歟夫心者神靈之府神棲於其間苟心謀之即神知之神知之則天地神明悉知之矣未有爲善惡不謀於心者旣謀於心則神道所察無逃於毫分無逃於毫分則福善禍淫其不差矣曰何爲顔生夭冉子疾盜跖壽莊蹻富楚穆霸田恒昌乎愚應之曰天道逺人道邇報應之效遲速難量故君子遭命小人有幸然吉凶紏纏豈止於一形乎故經曰天網恢恢疏而不失又曰其事好還則報應之道可明矣何必一切徵之於目前乎率性凝神章第二十七或問曰神主於靜使心有所欲何也愚應之曰神者無形之至靈者也神禀於道靜而合乎性人禀於神動而合乎情故率性則神凝爲情則神擾凝久則神止擾極則神還止則生遷則死皆情之所移非神之所使曰然則變性爲情者爲誰乎曰内則陰尸之氣所悖外則聲色之態所誘積習浩蕩不能自寧非神之所欲動也道反於俗章第二十八或問曰人情之所至愛者皆道家之所至忌何也愚應之曰夫福與壽人之所好禍與夭人之所惡不知至愛者招禍致夭無欲之介福永壽若斯而過求自害何迷之甚乎且燕趙艷色性之冤也鄭衛淫聲神之諠也珍饌㫖酒心之昏也搢紳紱冕體之煩也此四者捨之則靜取之則擾忘之則壽躭之則夭故爲道家之至忌也專精至道章第二十九或問曰古之學仙者至多而得道者至少何也愚應之曰常人學道者千而知道者一知道者千而志道者一志道者千而專精者一專精者千而勤久者一是以學者衆而成者寡也若知道能絶俗絶俗者能立志立志者能專精專精者能勤久未有學而不得者也曰然則理世者絶望於仙乎曰不然若特禀眞氣大庇羣生者則無妨於理世若中人好道志慕輕舉必藉於棲閑故太昊襲氣母軒轅昇雲軿顓頊處玄宫文命遊紫府斯皆撫俗而得道者也若乃玄元寄柱史南華吏漆園王喬莅葉縣方塑登金門此亦佐時而得道者也又仙欲隱宻道貴無名或昭其蹤或祕其跡不可以一途而察不可以一理而推按眞誥及抱朴子元始上仙記咸云自古至忠至孝至眞至廉有大功及物者皆有所得不同常流堯舜周孔伊吕昔諸聖賢皆上擢仙職斯所謂死而不亡者壽又白華自以隨世畏死而希仙没爲靈官其骨不朽功充之後靈肉附骸返魂還形倏忽輕舉若爾者則片善不失而況專以神仙爲務者乎長生可貴章第三十或問曰道之大㫖莫先乎老莊老莊之言不尚仙道而先生何獨貴乎仙者也愚應之曰何謂其不尚乎曰老子云死而不亡者壽又曰子孫祭祀不輟莊子曰孰能以死生爲一條又曰聖人以形骸爲逆旅此其證乎愚答曰玄聖立言爲中人爾中人入道不必皆仙是以教之先理其性理其性者必平易其心心平神和而道可冀故死生於人最大者也誰能無情情動性虧秪以速死令其當生不悅將死不懼翛然自適憂樂兩忘則情滅而性在形殁而神存猶愈於形性都亡故有齊死生之說斯爲至矣何爲乎不尚仙者也夫人所以死者形也其不亡者性也聖人所以不尚形骸者乃神之宅性之具也其所貴者神性爾若以死爲懼形骸爲眞是修身之道非修眞之妙矣老子曰深根固蔕長生久視之道又曰谷神不死莊子曰千載厭世去而上仙乘彼白雲至於帝鄉又曰故我修身千二百歲而形未嘗衰又曰乘雲氣馭飛龍以遊四海之外又曰人皆盡死而我獨存又曰神將守形形乃長生斯則老莊之言長生不死神仙明矣曷謂無乎又道德經南華論多明道以訓俗敦本以靜末神仙之奥存而不議其幽章隱書鍊眞妙道祕於三洞非賢不傳故輕泄者獲戾於天官欽崇者紀名於玄録殃慶逮乎九祖昇沈繫乎一身何可使行尸之徒悉聞悉見耳道無棄物章第三十一或問曰物自道生道無棄物何獨得道者靈長失道者滅亡乎愚應之曰夫龍之與魚同育於水明之與暗俱生於道龍則興雲施雨出有入無魚則在藻而樂失泉而枯龍則得水之妙而能化於水魚不得水之妙而不能化於水也上士則棲神鍊氣逸於霄漢之上下士則伐性損壽淪乎幽壤之下上士得道之妙而能化於道下士不得道之妙而不能化於道也故魚不知水之生乎巳而棄之非水之棄魚也人不知道之生乎巳而棄之非道之棄人也或曰龍魚異質明暗殊禀安能使魚化於水凡化於道乎愚答曰若魚能潜深淵匿幽穴不貪餌及其大也即奮鱗激鬛超吕梁而爲龍矣人能遊崆峒息澹泊絶嗜慾及其至也即含微契虛蹈眞境而爲仙矣所恨藏身不宻保神不固而水之與道豈負魚之與人哉明取捨章第三十二或問曰仙者人之所至美者也死者人之所至惡者也而歷代之君子罔有不知而從俗者至多習仙者至少何也愚應之曰此有二理一者所禀之氣非高即所希之志難廣故溺於近務忘乎逺見爲聲名所汩嗜慾所昏終縶伏於世網竟無蹈於眞域二者雖禀氣蕭遐神襟秀邁而濟物之功未備登仙之路猶逺是以遲迴人爵未解帝懸耳若夙勳已著名入丹臺則超跡絶塵物所不能累也又問曰仙必有骨無骨不可學仙奈何愚應之曰夫工者必因其材而施乎巧學者必有其骨而志乎道故冰不可鏤愚不可仙自然之理也所以神不清骨不峻者皆非禀陽靈之氣也非禀陽靈之氣者必無慕仙之心也苟有慕仙之心者未有不夙挺夫仙骨者也曰然則有仙骨不修而可致乎曰有骨而不學者亦如有材而無工故金蔵於礦也不冶而爲石道在於人也不鍊而爲凡雖無骨而不仙亦不可恃骨而待輕舉也以有契無章第三十三或問曰道本無象仙貴有形以有契無理難長久曷若得性遺形者之妙乎愚應之曰夫道至虛極也而含神運氣自無而生有故空洞杳冥者大道無形之形也天地日月者大道有形之形也以無係有以有合無故乾坤永存而仙聖不滅故生者天地之大德也所以見六合之廣三光之明者爲吾有形也若一從淪化而天地萬物盡非吾有即死者人倫之荼毒也是以鍊凡至於仙鍊仙至於眞鍊眞合乎妙合妙同乎神神與道合即道爲我身所以昇玉京遊金闕能有能無不終不殁何爲理難長久乎若獨以得性爲妙不知鍊形爲要者所謂清靈善爽之鬼何可與高仙爲比哉曰然則古有仙矣胡爲旣隱而不復見乎曰清濁殊流眞凡異境安可得而見邪雖然令威千載而暫歸玄元至今而屢降何爲不復見乎曰然則今之仙者爲誰乎曰自我唐以來可略而言矣劉慶雲舉於蜀土韋俊龍騰於嵩陽道合蟬蛻於太一洞玄骨飛於冀方其餘晦跡遁世得道輕舉者不可勝紀此皆接於聞見詎可誣而蔽之蓋知道者稀故得仙者寡至音不娱於俚耳悲夫宗玄先生玄綱論
